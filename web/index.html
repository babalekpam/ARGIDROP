<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B4332" />

    <!-- Primary -->
    <title>ArgiDrop — B2B Delivery Marketplace for West Africa</title>
    <meta name="description" content="Post a delivery in Lomé and across ECOWAS. Verified drivers nearby accept in minutes, you track live, and payment releases automatically on arrival. Built for businesses by ARGILETTE." />
    <meta name="keywords" content="delivery, Lomé, Togo, West Africa, ECOWAS, B2B logistics, last-mile delivery, motorbike delivery, courier, ArgiDrop, ARGILETTE" />
    <meta name="author" content="ARGILETTE" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <link rel="canonical" href="https://argidrop.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ArgiDrop" />
    <meta property="og:title" content="ArgiDrop — B2B Delivery Marketplace for West Africa" />
    <meta property="og:description" content="Post a delivery, a verified driver nearby accepts, you track live, payment releases on arrival. Built for businesses across West Africa." />
    <meta property="og:url" content="https://argidrop.com/" />
    <meta property="og:image" content="https://argidrop.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ArgiDrop — Business moves. We deliver." />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ArgiDrop — B2B Delivery Marketplace for West Africa" />
    <meta name="twitter:description" content="Post a delivery, a verified driver nearby accepts, you track live, payment releases on arrival." />
    <meta name="twitter:image" content="https://argidrop.com/og-image.png" />
    <meta name="twitter:image:alt" content="ArgiDrop — Business moves. We deliver." />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/argidrop-icon.png" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ArgiDrop",
      "legalName": "ARGILETTE",
      "url": "https://argidrop.com",
      "logo": "https://argidrop.com/og-image.png",
      "description": "B2B delivery marketplace connecting businesses with verified drivers across West Africa.",
      "areaServed": [
        { "@type": "Country", "name": "Togo" },
        { "@type": "AdministrativeArea", "name": "ECOWAS" }
      ],
      "founder": { "@type": "Organization", "name": "ARGILETTE" },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: Service / WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ArgiDrop",
      "url": "https://argidrop.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "Post delivery jobs and match with verified drivers across West Africa. Track in real time, pay on delivery confirmation.",
      "offers": {
        "@type": "Offer",
        "priceCurrency": "XOF",
        "price": "0",
        "description": "Free to register. Pay per delivery."
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
